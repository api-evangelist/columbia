---
aid: columbia
name: Columbia University
description: >-
  Columbia University is a private Ivy League research university in New York City,
  ranked #18 in the QS World University Rankings 2025. Its public developer and API
  footprint is modest and largely gated: the central Open Data Service publishes
  programming-friendly JSON/XML data feeds (course directory, CLIO library catalog,
  building access, and more) that require a Columbia UNI login, while Columbia
  University Libraries offers the CLIO catalog as open MARCXML bulk data under CC0.
  Identity and access integration is provided via CAS and a Shibboleth/SAML 2.0
  Identity Provider participating in the InCommon Federation. Source code is published
  across the cul (Libraries) and columbia-it (CUIT) GitHub organizations.
type: Index
position: Consumer
access: 3rd-Party
