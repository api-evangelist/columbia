reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      Columbia has a real but mostly gated developer footprint. The Open Data Service
      publishes JSON/XML data feeds but requires a Columbia UNI login, so no public
      endpoints could be exercised anonymously. The CLIO library catalog is genuinely
      open as monthly MARCXML bulk extracts under CC0 (verified via the Libraries
      documentation page). The CU Directory of Classes is public HTML with no official
      API; only an unofficial third-party JSON/CSV crawl exists. CAS and Shibboleth
      SAML 2.0 identity services are documented for integrators. Two active GitHub orgs
      (cul, columbia-it) were verified via the GitHub API. Several institutional URLs
      return HTTP 403 to non-browser clients (bot blocking) but resolve normally in a
      browser; no endpoints were fabricated. The columbia.developer.azure-api.net
      portal surfaced in search belongs to Columbia Sportswear, not the university, and
      was excluded.
    endpoints:
